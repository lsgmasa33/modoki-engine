version: 2
updates:
  # npm dependencies (root + workspaces). Grouped into one PR per run to cut noise.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-all:
        patterns: ["*"]
  # GitHub Actions used by the workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
