# Signed + notarized macOS release (public OSS repo).
# Builds the Modoki editor on an Apple-Silicon runner, signs with the Developer ID
# Application cert, notarizes via the App Store Connect API key, staples, then
# (on a v* tag) attaches the dmg/zip/blockmap + latest-mac.yml to a GitHub Release.
#
# Auto-update feed = GitHub Releases (electron-builder.yml uses the `github` provider,
# so the built editor's app-update.yml points at THIS repo's Releases). No GCS bucket.
# NOTE: electron-updater can only read the feed once the repo is PUBLIC — until then the
# DMG is a manual download from the Release and in-app auto-update stays dormant.
#
# Required repository secrets:
#   MAC_CERT_P12_BASE64    base64 of the Developer ID Application cert exported from
#                          Keychain Access as a .p12 (cert + private key):
#                            base64 -i DeveloperID.p12 | pbcopy
#   MAC_CERT_PASSWORD      the password set on that .p12 export
#   APPLE_API_KEY_P8       the full contents of the App Store Connect API key
#                          (the AuthKey_XXXX.p8 file, incl. the BEGIN/END lines)
#   APPLE_API_KEY_ID       the key id (e.g. L2DY5KVPM4)
#   APPLE_API_ISSUER       the issuer id (a UUID)

name: Release (macOS)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# The default GITHUB_TOKEN is read-only when the repo's default workflow
# permissions are restricted; action-gh-release needs contents:write to create
# the Release and upload the dmg/zip (else: 403 "Resource not accessible").
permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14   # Apple Silicon (arm64) — matches the build target
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      # Build the capacitor-* workspace packages (their dist/ is gitignored) so the
      # editor vite build can resolve them. After install — see ci.yml note.
      - name: Build native plugin packages
        run: npm run build:plugins

      # Stamp package.json with the tag version (strip the leading "v") so the
      # artifacts, dmg filename, and latest-mac.yml carry a real, increasing
      # version — auto-update (electron-updater) needs this. workflow_dispatch
      # (no tag) keeps the committed 0.0.0.
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting version to $VERSION"
          npm version --no-git-tag-version --allow-same-version "$VERSION"

      # ── Stage native import tools BEFORE the build (parity with Windows) ────────
      # The beforePack stagers (stage-toktx.cjs / stage-msdf.cjs) copy whatever is
      # INSTALLED on the build machine into build/bin → Contents/Resources/bin, then
      # electron-builder signs them. The macOS CI runner ships neither tool, so
      # without these installs both stagers degrade SILENTLY (log + skip) and the DMG
      # ships toolless — exactly the regression this fixes. Unlike Windows (a plain
      # binary copy), macOS RELIES on the stagers to relocate the dylib closure + fix
      # load paths, so here we INSTALL to the canonical locations the stagers look up
      # (toktx → /usr/local via the KTX pkg; msdf-atlas-gen → /opt/homebrew via brew)
      # and let the existing, tested stagers do the relocation + re-signing.
      - name: Install toktx (KTX-Software) for bundling
        run: |
          set -euo pipefail
          KTX_VER=4.4.2
          # sha256 of KTX-Software-${KTX_VER}-Darwin-arm64.pkg (GitHub release digest).
          KTX_SHA=500bd8f9d63358c3f3a0d83b724c8574436a72c37dc0e4bad90ec1ca38032c3c
          url="https://github.com/KhronosGroup/KTX-Software/releases/download/v${KTX_VER}/KTX-Software-${KTX_VER}-Darwin-arm64.pkg"
          curl -fsSL "$url" -o ktx.pkg
          echo "${KTX_SHA}  ktx.pkg" | shasum -a 256 -c -
          sudo installer -pkg ktx.pkg -target /
          rm -f ktx.pkg
          /usr/local/bin/toktx --version

      - name: Install msdf-atlas-gen for bundling
        run: |
          set -euo pipefail
          # GitHub runners ship Homebrew with auto-update disabled + a frozen formula
          # index, so a fresh formula can 404 ("No available formula"). Refresh first.
          brew update
          brew install msdf-atlas-gen
          msdf-atlas-gen -version

      - name: Import signing cert + G2 intermediate into a temp keychain
        env:
          MAC_CERT_P12_BASE64: ${{ secrets.MAC_CERT_P12_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/modoki-signing.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          # Developer ID Application cert + private key.
          echo "$MAC_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$MAC_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          # Apple's Developer ID G2 intermediate (needed for a complete trust chain).
          curl -fsS -o "$RUNNER_TEMP/g2.cer" https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer
          security import "$RUNNER_TEMP/g2.cer" -k "$KEYCHAIN" || true
          # Let codesign use the key non-interactively, and make the keychain searchable.
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          rm -f "$RUNNER_TEMP/cert.p12"
          security find-identity -v -p codesigning "$KEYCHAIN"

      - name: Write App Store Connect API key
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          set -euo pipefail
          printf '%s' "$APPLE_API_KEY_P8" > "$RUNNER_TEMP/AuthKey.p8"

      - name: Build, sign, notarize, staple
        env:
          # Point electron-builder's signing at the temp keychain explicitly
          # (don't rely on auto-discovery picking the right identity).
          CSC_KEYCHAIN: ${{ runner.temp }}/modoki-signing.keychain-db
          APPLE_API_KEY: ${{ runner.temp }}/AuthKey.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: npm run dist:mac

      # Fail the build if Gatekeeper would reject the app, or if either the .app or
      # the .dmg isn't actually stapled — so a "green" release can never ship an
      # un-notarized/un-stapled artifact (the hooks notarize, this asserts it took).
      - name: Verify notarization + stapling
        run: |
          set -euo pipefail
          APP="$(find release -maxdepth 2 -name '*.app' -type d | head -1)"
          DMG="$(find release -maxdepth 1 -name '*.dmg' | head -1)"
          echo "App: $APP"
          echo "Dmg: $DMG"
          test -n "$APP" && test -n "$DMG"
          echo '── Gatekeeper assessment (app) ──'
          spctl -a -vvv -t install "$APP"
          echo '── Staple validate (app) ──'
          xcrun stapler validate "$APP"
          echo '── Staple validate (dmg) ──'
          xcrun stapler validate "$DMG"

      # HARD GUARD — the beforePack stagers degrade SILENTLY (a missing tool logs a
      # WARN and continues), so without this a green release could ship a DMG WITHOUT
      # its bundled tools and nobody would notice until a user's KTX2 texture or MTSDF
      # font import fails. Assert every expected file landed in the packaged
      # Contents/Resources/bin, then RUN toktx + msdf-atlas-gen from the bundle to
      # prove their relocated dylib closures resolve under the signed binary. Keep
      # this list in sync with stage-toktx.cjs / stage-msdf.cjs.
      - name: Verify bundled native tools present + runnable
        run: |
          set -uo pipefail
          APP="$(find release -maxdepth 2 -name '*.app' -type d | head -1)"
          BIN="$APP/Contents/Resources/bin"
          echo "Resources/bin:"; ls -la "$BIN" || true
          missing=0
          for f in toktx libktx.4.dylib msdf-atlas-gen; do
            if [ -f "$BIN/$f" ]; then
              echo "[verify-tools] OK: $f ($(wc -c < "$BIN/$f") bytes)"
            else
              echo "[verify-tools] MISSING: $BIN/$f"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "::error::Bundled tool(s) missing from Resources/bin — an Install/Stage step likely failed (see the 'Install toktx' / 'Install msdf-atlas-gen' logs above). Refusing to ship a toolless DMG."
            exit 1
          fi
          set -e
          # Prove the relocated dylib closures resolve (both exit 0 on --version).
          "$BIN/toktx" --version
          "$BIN/msdf-atlas-gen" -version
          echo "[verify-tools] all bundled tools present + runnable."

      # Gate the release on the packaged editor actually RENDERING — catches
      # "blank editor window" packaging bugs (e.g. the @zappar/msdf-generator
      # out-of-tree dep-cache resolution failure) that build+sign+notarize all pass.
      # No games/ in the public repo — scaffold a throwaway starter project for the smoke
      # to open (scaffold-project.mjs accepts any target dir). Validated on the v0.2.23
      # release run (all three smoke steps passed), so these are now FATAL gates.
      - name: Scaffold a smoke project (starter)
        run: |
          set -euo pipefail
          node engine/scripts/scaffold-project.mjs "$RUNNER_TEMP/smoke" "Smoke"
          npm --prefix "$RUNNER_TEMP/smoke" install
      - name: Smoke — packaged editor renders (no blank window)
        run: |
          set -euo pipefail
          APP="$(find release -maxdepth 2 -name '*.app' -type d | head -1)"
          bash engine/scripts/assert-app-renders.sh "$APP" "$RUNNER_TEMP/smoke"

      # Gate on the SHIPPED binary actually enforcing its prod CSP — a CSP-blocked
      # CDN script (MediaPipe wasm loader for the on-device-LLM games) doesn't blank
      # the editor, so the render gate above can't catch it. This is the layer that
      # would have caught DMG 0.2.0 (its binary predated the https: script-src fix).
      - name: Smoke — packaged editor CSP permits on-device-LLM CDN
        run: |
          set -euo pipefail
          APP="$(find release -maxdepth 2 -name '*.app' -type d | head -1)"
          node engine/scripts/assert-app-csp.mjs "$APP" "$RUNNER_TEMP/smoke"

      - name: Remove API key from runner
        if: always()
        run: rm -f "$RUNNER_TEMP/AuthKey.p8"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: modoki-editor-macos
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac.yml
          if-no-files-found: error

      # ── Auto-update feed = GitHub Releases (github provider) ───────────────────
      # The GCS bucket is retired for the OSS repo: electron-builder.yml uses the
      # `github` provider, so the built editor's app-update.yml points at THIS repo's
      # GitHub Releases. The "Attach to GitHub Release" step below IS the feed —
      # electron-updater reads latest-mac.yml + the zip/blockmap from the release
      # assets. (GitHub Releases only serve as an update feed once the repo is PUBLIC.)

      - name: Attach to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac.yml
