# CLA gate — posts a required "CLA Assistant" status check on every PR and blocks it until the
# author has signed the CLA (oss/CLA.md → public root CLA.md). Signatures are stored IN THIS REPO
# (branch `cla-signatures`, file `signatures/cla.json`) — no third-party service.
#
# Enforcement is two parts:
#   1. This workflow provides the status check + the comment-to-sign flow.
#   2. A branch-protection RULE on the default branch must mark "CLA Assistant" as a REQUIRED
#      status check (and require a PR + review). Without that rule the check is advisory — see the
#      maintainer setup in CONTRIBUTING / the OSS plan.
#
# Security note: this uses `pull_request_target` (needed to comment/set status on fork PRs). The
# action does NOT check out or run PR code, so secrets are not exposed to untrusted contributions.
# Also enable Settings → Actions → "Require approval for all outside collaborators" as defense in depth.

name: "CLA Assistant"

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: 'signatures/cla.json'
          path-to-document: 'https://github.com/lsgmasa33/modoki-engine/blob/main/CLA.md'
          branch: 'cla-signatures'
          # The sign phrase a contributor comments to accept:
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-notsigned-prcomment: 'Thanks for your pull request! Before we can merge it, please read our [Contributor License Agreement](CLA.md) and sign it by commenting the phrase below on this PR.'
          # Bots / the maintainer never need to sign:
          allowlist: 'dependabot[bot],lsgmasa33'
