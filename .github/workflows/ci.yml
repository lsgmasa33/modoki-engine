# Public-repo CI — the engine-only gate: typecheck + lint + the app & engine test suites.
# No signing, no GPU, no Electron launch. This is the curated public counterpart of the private
# repo's ci.yml (docs/plans/engine-oss-public-repo.md): it drops the private-only game-project
# steps (there is no games/ here) and git-LFS fetch (the LFS-tracked skinned-test GLBs live with a
# game, so those tests skip). The root `npm ci` postinstall installs the MCP tool deps + builds the
# workspace plugins, so no separate tool/game install step is needed.

name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'   # gate never launches Electron
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      # The capacitor-* workspace packages ship their .d.ts / JS only in a gitignored dist/.
      # Build them AFTER install (rollup's native binary isn't linked yet during npm ci's
      # postinstall — npm bug #4828) so the app typecheck/tests can resolve them.
      - name: Build native plugin packages
        run: npm run build:plugins

      - name: Typecheck (app + engine)
        run: npm run typecheck

      - name: Lint (incl. the no-/api parity gate)
        run: npm run lint

      - name: App tests
        run: npm test

      - name: Engine tests
        run: npm --prefix engine/packages/modoki test
